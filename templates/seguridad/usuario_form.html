{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container">
  <h2>{% if form.instance.pk %}Editar Usuario{% else %}Nuevo Usuario{% endif %}</h2>
  <form method="post" novalidate>
    {% csrf_token %}
    {{ form|crispy }}
    <div class="mt-3">
      <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Guardar</button>
      <a href="{% url 'seguridad:usuario_list' %}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
