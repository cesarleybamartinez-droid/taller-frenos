{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container">
  <h2>Agregar Servicio</h2>
  <p class="text-muted">Orden #{{ view.kwargs.orden_pk }}</p>
  <form method="post" novalidate>
    {% csrf_token %}
    {{ form|crispy }}
    <div class="mt-3">
      <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Agregar</button>
      <a href="{% url 'ordenes:orden_detail' view.kwargs.orden_pk %}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const servicioSelect = document.getElementById('id_servicio');
    const precioInput = document.getElementById('id_precio_unitario');

    servicioSelect.addEventListener('change', function() {
        const servicioId = this.value;
        if (servicioId) {
            fetch(`/ordenes/api/precio-servicio/?servicio_id=${servicioId}`)
                .then(response => response.json())
                .then(data => {
                    precioInput.value = data.precio;
                });
        } else {
            precioInput.value = '';
        }
    });
});
</script>

{% endblock content %}
