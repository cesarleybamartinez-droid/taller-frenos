{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container">
  <h2>Nueva Orden de Trabajo</h2>
  <form method="post" novalidate>
    {% csrf_token %}
    {{ form|crispy }}
    <div class="mt-3">
      <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Crear Orden</button>
      <a href="{% url 'ordenes:orden_list' %}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
