{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container">
  <h2>Editar Repuesto</h2>
  <p class="text-muted">Orden #{{ view.kwargs.orden_pk }}</p>
  <form method="post" novalidate>
    {% csrf_token %}
    {{ form|crispy }}
    <div class="mt-3">
      <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Guardar cambios</button>
      <a href="{% url 'ordenes:orden_detail' view.kwargs.orden_pk %}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
