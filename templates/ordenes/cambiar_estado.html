{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container">
  <h2>Cambiar Estado</h2>
  <p class="text-muted">Orden #{{ orden.id }} – Estado actual: <strong>{{ orden.estado }}</strong></p>
  <form method="post" novalidate>
    {% csrf_token %}
    {{ form|crispy }}
    <div class="mt-3">
      <button type="submit" class="btn btn-warning"><i class="bi bi-arrow-repeat"></i> Cambiar estado</button>
      <a href="{% url 'ordenes:orden_detail' orden.pk %}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
