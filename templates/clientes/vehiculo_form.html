{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container">
  <h2>{% if form.instance.pk %}Editar Vehículo{% else %}Nuevo Vehículo{% endif %}</h2>
  <form method="post" novalidate>
    {% csrf_token %}
    {{ form|crispy }}
    <div class="mt-3">
      <button type="submit" class="btn btn-success">
        <i class="bi bi-check-lg"></i> Guardar
      </button>
      <a href="{% url 'clientes:vehiculo_list' %}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const marcaSelect = document.getElementById('id_marca');
    const modeloSelect = document.getElementById('id_modelo');

    marcaSelect.addEventListener('change', function() {
        const marcaId = this.value;
        // Limpiar opciones actuales
        modeloSelect.innerHTML = '<option value="">---------</option>';

        if (marcaId) {
            fetch(`/clientes/api/modelos/?marca_id=${marcaId}`)
                .then(response => response.json())
                .then(data => {
                    data.forEach(modelo => {
                        const option = document.createElement('option');
                        option.value = modelo.id;
                        option.textContent = modelo.nombre;
                        modeloSelect.appendChild(option);
                    });
                });
        }
    });
});
</script>
{% endblock content %}
